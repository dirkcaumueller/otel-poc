services:

  node1:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/rocky10-pg:latest
    pull_policy: build
    container_name: node1
    hostname: node1
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /sbin/init
    networks:
      pg-net:
        ipv4_address: 172.20.0.11
    restart: unless-stopped

  node2:
    image: localhost/rocky10-pg:latest
    container_name: node2
    hostname: node2
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /sbin/init
    networks:
      pg-net:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

  node3:
    image: localhost/rocky10-pg:latest
    container_name: node3
    hostname: node3
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /sbin/init
    networks:
      pg-net:
        ipv4_address: 172.20.0.13
    restart: unless-stopped

networks:
  pg-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1