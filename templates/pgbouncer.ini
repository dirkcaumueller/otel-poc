[databases]
* = host=127.0.0.1 port=5432

[users]

[pgbouncer]
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /run/pgbouncer/pgbouncer.pid
listen_addr = *
listen_port = 6432
client_tls_sslmode = disable
;client_tls_ca_file = /home/pgbouncer/certs/ca.pem
;client_tls_key_file = /home/pgbouncer/certs/pgbouncer-client-key.pem
;client_tls_cert_file = /home/pgbouncer/certs/pgbouncer-client.pem
;client_tls_ciphers = secure
;client_tls13_ciphers = TLS_AES_256_GCM_SHA384 TLS_CHACHA20_POLY1305_SHA256 TLS_AES_128_GCM_SHA256 TLS_AES_128_CCM_8_SHA256 TLS_AES_128_CCM_SHA256
;client_tls_protocols = tlsv1.3
;client_tls_dheparams = auto
;client_tls_ecdhcurve = auto
server_tls_sslmode = disable
;server_tls_ca_file = /home/pgbouncer/certs/ca.pem
;server_tls_key_file = /home/pgbouncer/certs/pgbouncer-server-key.pem
;server_tls_cert_file = /home/pgbouncer/certs/pgbouncer-server.pem
;server_tls_protocols = tlsv1.3
;server_tls_ciphers = secure
;server_tls13_ciphers =
auth_user=pgbouncer
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT username, password FROM pgbouncer.get_auth($1)
auth_dbname = postgres
admin_users = pgbouncer_admin
stats_users = otel
pool_mode = transaction
;max_prepared_statements = 0
server_reset_query = DISCARD ALL
track_extra_parameters = IntervalStyle
ignore_startup_parameters = extra_float_digits
server_check_query = select 1
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 0
reserve_pool_size = 5
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 0
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 15
idle_transaction_timeout=300
tcp_keepidle=1200