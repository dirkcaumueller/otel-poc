[db]
pg1-path=/var/lib/pgsql/18/data
pg1-user=postgres
pg1-port=5432
pg1-socket-path=/run/postgresql
#pg1-host-ca-file=/var/lib/pgsql/certs/ca.pem
#pg1-host-cert-file=/var/lib/pgsql/certs/pg-server.pem
#pg1-host-key-file=/var/lib/pgsql/certs/pg-server-key.pem

[global]
repo1-type=posix
repo1-path=/var/lib/pgsql/pgbackrest
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass={{ REPO_CIPHER_PASS }}
repo1-storage-verify-tls=n
repo1-storage-port=3900
repo1-retention-full=7
repo1-retention-full-type=time
repo1-bundle=y
start-fast=y
log-path=/var/log/pgbackrest
log-level-console=info
log-level-file=info
spool-path=/var/lib/pgsql/pgbackrest_spool
lock-path=/var/lib/pgsql/pgbackrest_lock
delta=y
process-max=2
archive-async=y
archive-get-queue-max=4GiB
compress-type=lz4

[global:archive-push]
compress-level=3
