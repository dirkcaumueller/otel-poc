scope: 'pgcluster1'
namespace: 'postgres'
name: node1

log:
  type: json
  dir: /var/log/patroni
  mode: 0640
  level: INFO
  max_queue_size: 1000
  traceback_level: ERROR

restapi:
  connect_address: 172.20.0.11:8008
  listen: 172.20.0.11:8008
#  cafile: /var/lib/pgsql/pg-certs/ca.pem
#  certfile: /var/lib/pgsql/pg-certs/pg-server.pem
#  keyfile: /var/lib/pgsql/pg-certs/pg-server-key.pem
  authentication:
    username: patroni
    password: patroni

ctl:
  insecure: true
#  cafile: /var/lib/pgsql/pg-certs/ca.pem
#  certfile: /var/lib/pgsql/pg-certs/pg-server.pem
#  keyfile: /var/lib/pgsql/pg-certs/pg-server-key.pem

etcd3:
  hosts:
    - node1:2379
  protocol: http

bootstrap:
  dcs:
    loop_wait: 10
    retry_timeout: 10
    ttl: 30
    maximum_lag_on_failover: 1048576
    primary_start_timeout: 300
    synchronous_mode: false
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        hot_standby: 'on'
        max_connections: 100
        max_locks_per_transaction: 64
        max_prepared_transactions: 0
        max_replication_slots: 10
        max_wal_senders: 10
        max_worker_processes: 8
        track_commit_timestamp: 'off'
        wal_keep_size: 128MB
        wal_level: replica
        wal_log_hints: 'on'
        # PGTune (https://pgtune.leopard.in.ua/)
        shared_buffers: '1GB'
        effective_cache_size: '3GB'
        maintenance_work_mem: '256MB'
        checkpoint_completion_target: '0.9'
        wal_buffers: '64MB'
        default_statistics_target: '100'
        random_page_cost: '1.1'
        effective_io_concurrency: '200'
        work_mem: '9709kB'
        huge_pages: 'try'
        min_wal_size: '2GB'
        max_wal_size: '8GB'
        # CIS Benchmark v17 (https://www.cisecurity.org/benchmark/postgresql)
        log_destination: 'jsonlog'
        logging_collector: 'on'
        log_directory: '/var/log/postgres'
        log_filename: 'postgresql-%a.log'
        log_file_mode: '0640'
        log_truncate_on_rotation: 'on'
        log_rotation_age: '1d'
        log_rotation_size: '1GB'
        log_min_messages: 'warning'
        log_min_error_statement: 'error'
        debug_print_parse: 'off'
        debug_print_rewritten: 'off'
        debug_print_plan: 'off'
        debug_pretty_print: 'on'
        log_connections: 'on'
        log_disconnections: 'on'
        log_error_verbosity: 'verbose'
        log_hostname: 'off'
        log_line_prefix: '%m [%r] [%p]: [l-%l] %u@%d,app=%a,e=%e '
        log_statement: 'none'
        log_timezone: 'UTC'
        shared_preload_libraries: 'pgaudit,pg_stat_statements'
#        ssl: 'on'
#        ssl_cert_file: '/var/lib/pgsql/certs/pg-server.pem'
#        ssl_key_file: '/var/lib/pgsql/certs/pg-server-key.pem'
#        ssl_ca_file: '/var/lib/pgsql/certs/ca.pem'
#        ssl_min_protocol_version: 'TLSv1.3'
        log_replication_commands: 'on'
        # Custom
        log_lock_failures: 'on'
        log_checkpoints: 'on'
        log_lock_waits: 'on'
        archive_mode: 'on'
        archive_command: 'pgbackrest --config=/etc/pgbackrest.conf --stanza=db archive-push %p'
        lc_messages: 'C'
        autovacuum_analyze_scale_factor: '0.01'
        autovacuum_vacuum_scale_factor: '0.02'
        autovacuum_vacuum_insert_scale_factor: '0.02'
        autovacuum_vacuum_cost_limit: '2000'
        ssl_ciphers: 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305'
        ssl_prefer_server_ciphers: 'on'
#        ssl_ecdh_curve: 'prime256v1'
        ssl_tls13_ciphers: ''
        # PGAudit
        pgaudit.log: 'none'
        pgaudit.log_catalog: 'off'
        pgaudit.log_level: 'notice'
        # credcheck
        

      recovery_conf:
        restore_command: 'pgbackrest --config=/etc/pgbackrest.conf --stanza=db archive-get %f %p'
      pg_hba:
      - local all postgres peer
      - host replication replicator 127.0.0.1/32 scram-sha-256
      - host replication replicator 172.20.0.0/24 scram-sha-256
      - host all all 0.0.0.0/0 scram-sha-256

  initdb:
    - encoding: UTF8
    - data-checksums
    - waldir: /var/lib/pgsql/18/wal

  post_init: /var/lib/pgsql/postgres_init.sh

postgresql:
  authentication:
    replication:
      password: 'replicator'
      username: replicator
    rewind:
      password: 'rewind_user'
      username: rewind_user
    superuser:
      password: 'postgres'
      username: postgres
  bin_dir: '/usr/pgsql-18/bin'
  connect_address: 172.20.0.11:5432
  data_dir: '/var/lib/pgsql/18/data'
  listen: 127.0.0.1,172.20.0.11:5432
  parameters:
    password_encryption: scram-sha-256
    unix_socket_directories: '/run/postgresql'

tags:
  clonefrom: true
  failover_priority: 1
  noloadbalance: false
  nostream: false
  nosync: false
  sync_priority: 1
